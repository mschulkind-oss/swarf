version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: swarf
    ldflags:
      - -s -w
      - -X github.com/mschulkind-oss/swarf/internal/version.Version={{.Version}}
      - -X github.com/mschulkind-oss/swarf/internal/version.GitCommit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "swarf_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

brews:
  - repository:
      owner: mschulkind-oss
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/mschulkind-oss/swarf"
    description: "Invisible, auto-syncing personal storage for any git repo"
    license: "Apache-2.0"
    install: |
      bin.install "swarf"
    test: |
      system "#{bin}/swarf", "--version"
